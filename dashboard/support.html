<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Support — ThriveMine</title>
  <link rel="stylesheet" href="css/shared.css"/>
  <style>
    .alert{display:none;}
    .ticket-card {
      background:var(--bg2); border:1px solid var(--border2); border-radius:10px;
      padding:16px; margin-bottom:12px; transition:border-color .2s;
    }
    .ticket-card:hover { border-color:var(--border); }
    .ticket-subject { font-weight:600; font-size:.9rem; margin-bottom:4px; }
    .ticket-preview { color:var(--muted); font-size:.82rem; }
    .reply-box {
      background:rgba(255,119,0,.05); border:1px solid var(--border);
      border-radius:6px; padding:12px; margin-top:8px;
      font-size:.82rem; color:rgba(255,255,255,.7); line-height:1.6;
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">
      <div class="page-hdr"><h1>Support</h1><p>Get help from our team — we respond within 1 hour.</p></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">

        <!-- New ticket -->
        <div>
          <div class="card">
            <h3 style="font-family:'Rajdhani',sans-serif;font-size:1rem;margin-bottom:16px;">Send a Message</h3>
            <div id="ticketAlert" class="alert"></div>
            <form id="ticketForm">
              <div class="field"><label>Subject</label>
                <select id="subject" class="input select">
                  <option>Investment Plans</option>
                  <option>Deposit Issue</option>
                  <option>Withdrawal Issue</option>
                  <option>Account Access</option>
                  <option>Referral Program</option>
                  <option>Technical Issue</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="field"><label>Message</label>
                <textarea id="message" class="input" style="min-height:120px;resize:vertical;"
                  placeholder="Describe your issue in detail…" required></textarea>
              </div>
              <button type="submit" class="btn btn-green" id="sendTicketBtn">Send Message</button>
            </form>
          </div>

          <!-- Contact info -->
          <div class="card card-green" style="margin-top:16px;">
            <h3 style="font-family:'Rajdhani',sans-serif;font-size:.9rem;margin-bottom:12px;">Other Ways to Reach Us</h3>
            <div style="display:flex;flex-direction:column;gap:10px;font-size:.83rem;color:var(--muted);">
              <div>📧 <a href="mailto:support@thrivemine.com" style="color:var(--green);">support@thrivemine.com</a></div>
              <div>💬 Telegram: <a href="#" style="color:var(--green);">@ThriveMineSupport</a></div>
              <div>📍 Rochester, New York City, USA</div>
              <div>⏰ 24/7 support — response within 1 hour</div>
            </div>
          </div>
        </div>

        <!-- Ticket history -->
        <div>
          <div class="card">
            <h3 style="font-family:'Rajdhani',sans-serif;font-size:1rem;margin-bottom:16px;">My Tickets</h3>
            <div id="ticketList">
              <div style="text-align:center;color:var(--muted);padding:20px;"><div class="spinner"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="lib/supabase.js"></script>
<script src="js/dashboard-layout.js"></script>
<script>
let currentUser = null;
(async () => {
  currentUser = await requireUser();
  if (!currentUser) return;
  document.getElementById('sidebar').innerHTML = renderSidebar('support', currentUser);
  document.getElementById('topbar').innerHTML  = renderTopbar('Support');
  loadTickets();
})();

async function loadTickets() {
  const { data } = await db.from('support_messages').select('*')
    .eq('user_id', currentUser.id).order('created_at',{ascending:false});
  const list = document.getElementById('ticketList');
  if (!data || !data.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><p>No tickets yet. Send a message to get started.</p></div>';
    return;
  }
  list.innerHTML = data.map(t => `
    <div class="ticket-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div class="ticket-subject">${t.subject || 'General'}</div>
        ${statusBadge(t.status)}
      </div>
      <div class="ticket-preview">${t.message.substring(0,100)}${t.message.length>100?'…':''}</div>
      ${t.reply ? `<div class="reply-box"><strong style="color:var(--green);">Admin replied:</strong><br>${t.reply}</div>` : ''}
      <div style="font-size:.72rem;color:var(--muted);margin-top:8px;">${fmtDateTime(t.created_at)}</div>
    </div>
  `).join('');
}

document.getElementById('ticketForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('sendTicketBtn');
  setLoading(btn, true, 'Sending…');
  const { error } = await db.from('support_messages').insert({
    user_id: currentUser.id,
    subject: document.getElementById('subject').value,
    message: document.getElementById('message').value,
  });
  setLoading(btn, false);
  if (error) { showAlert(document.getElementById('ticketAlert'), error.message); return; }
  showAlert(document.getElementById('ticketAlert'), '✅ Message sent! We\'ll reply within 1 hour.', 'success');
  e.target.reset();
  loadTickets();
});
</script>
</body>
</html>
